# PostgreSQL database configuration for Active Record
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { 'postgres' } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { nil } %>
  host: <%= ENV.fetch("DATABASE_HOST") { 'localhost' } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>

development:
  <<: *default
  database: city_planning_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: city_planning_test

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME") { 'city_planning_production' } %>
    username: <%= ENV.fetch("DATABASE_USERNAME") { 'city_planning' } %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DATABASE_CACHE_NAME") { 'city_planning_production_cache' } %>
    migrations_paths: db/cache_migrate
    username: <%= ENV.fetch("DATABASE_USERNAME") { 'city_planning' } %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
  queue:
    <<: *default
    database: <%= ENV.fetch("DATABASE_QUEUE_NAME") { 'city_planning_production_queue' } %>
    migrations_paths: db/queue_migrate
    username: <%= ENV.fetch("DATABASE_USERNAME") { 'city_planning' } %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
  cable:
    <<: *default
    database: <%= ENV.fetch("DATABASE_CABLE_NAME") { 'city_planning_production_cable' } %>
    migrations_paths: db/cable_migrate
    username: <%= ENV.fetch("DATABASE_USERNAME") { 'city_planning' } %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
